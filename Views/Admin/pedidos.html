<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProntaComanda - Layout 1</title>
    <link rel="stylesheet" href="/wwwroot/css/global/color.css">
    <link rel="stylesheet" href="/wwwroot/css/global/reset.css">
    <link rel="stylesheet" href="/wwwroot/css/styles/layout.css">
    <link rel="stylesheet" href="/wwwroot/css/styles/pedidos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .pedidos {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding: 32px 16px;
        }

        .card-pedido {
            min-width: 300px;
            width: 375px;
            max-width: 375px;
            height: 500px;
            background: var(--grey);
            border-radius: 16px;
            border: 1px solid #777777;
            box-shadow: 0 2px 8px #0000002e;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: start;

            & .status {
                width: 100%;
                height: 10%;
                padding: 5px 0 0 0;

                & h2 {
                    font-size: 1.4rem;
                    font-weight: 600;
                    color: var(--platinum);
                }
            }

            & .pedido-content {
                width: 100%;
                height: auto;
                background-color: var(--platinum);
                border-radius: .6rem;
                padding: .7rem;

                & .p-content-header {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;

                    & span {
                        font-size: 0.9rem;
                        font-weight: 600;
                        color: var(--space-indigo);
                    }
                }

                & .p-content-info {
                    padding: 1rem .7rem .7rem 1rem;

                    & h3 {
                        list-style: circle;
                        font-size: 1.1rem;
                        font-weight: 600;
                        padding-left: 5px;
                        color: var(--space-indigo);

                        &::before {
                            content: '•';
                            color: var(--space-indigo);
                            font-size: 1rem;
                            display: inline-block;
                            width: 1.5rem;
                        }
                    }

                    & .observacao {
                        font-size: 0.9rem;
                        font-weight: 400;
                        color: var(--flag-red);
                    }
                }
            }
    </style>
</head>

<body>
    <div class="admin-page">
        <aside class="admin-sidebar" aria-label="Navegação principal">
            <div class="sidebar-logo">
                <i class="fa-solid fa-cubes-stacked" aria-hidden="true"></i>
                <span class="logo-text">ProntaComanda</span>
            </div>
            <nav class="sidebar-nav" aria-label="Menu administrativo">
                <a href="/Views/Admin/cardapio.html" title="Cardápio">
                    <i class="fa-solid fa-utensils" aria-hidden="true"></i>
                    <span class="menu-text">Cardápio</span>
                </a>
                <a href="/Views/Admin/mesa.html" title="Mesas">
                    <i class="fa-solid fa-bell-concierge" aria-hidden="true"></i>
                    <span class="menu-text">Mesas</span>
                </a>
                <a href="#" class="active" title="Pedidos">
                    <i class="fa-solid fa-fire" aria-hidden="true"></i>
                    <span class="menu-text">Pedidos</span>
                </a>
                <a href="#" title="Dashboard">
                    <i class="fa-solid fa-chart-line" aria-hidden="true"></i>
                    <span class="menu-text">Dashboard</span>
                </a>
                <a href="#" title="Funcionários">
                    <i class="fa-solid fa-user" aria-hidden="true"></i>
                    <span class="menu-text">Funcionários</span>
                </a>
            </nav>
        </aside>

        <main class="admin-content">
            <header class="content-header">
                <div class="header-left">
                    <h1>Pedidos</h1>
                    <p>Visualize os pedidos dos clientes.</p>
                </div>
            </header>

            <section>
                <div class="pedidos">
                    <div class="card-pedido">
                        <div class="status">
                            <h2>Em andamento</h2>
                        </div>
                        <div class="pedido-content">
                            <div class="p-content-header">
                                <h3>Mesa 01</h3>
                                <span>12:30</span>
                            </div>
                            <div class="p-content-info">
                                <h3>1x X-Burguer</h3>
                                <p class="observacao">Observação: não deve ter cebola</p>
                            </div>
                        </div>
                    </div>
                    <!-- Adicione mais cards conforme necessário -->
                </div>
            </section>
        </main>
    </div>
</body>

</html>
